name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "MISKMATCH_BACKEND_FINAL/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "MISKMATCH_BACKEND_FINAL/**"
      - ".github/workflows/backend.yml"

defaults:
  run:
    working-directory: MISKMATCH_BACKEND_FINAL/miskmatch

jobs:
  # ── Lint & Format ──────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: MISKMATCH_BACKEND_FINAL/miskmatch/requirements.txt

      - name: Install linters
        run: pip install ruff black

      - name: Ruff check
        run: ruff check app/ tests/ scripts/

      - name: Black check
        run: black --check app/ tests/ scripts/

  # ── Type Check ─────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: MISKMATCH_BACKEND_FINAL/miskmatch/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install mypy types-redis

      - name: Mypy
        run: mypy app/ --ignore-missing-imports --no-error-summary || true

  # ── Tests ──────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: MISKMATCH_BACKEND_FINAL/miskmatch/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          ENVIRONMENT: development
          SECRET_KEY: ci-test-secret-key-minimum-32-characters
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          DATABASE_URL_SYNC: sqlite:///./test.db
          REDIS_URL: redis://localhost:6379/0
        run: >
          pytest tests/ -v
          --asyncio-mode=auto
          --tb=short
          --deselect tests/test_webhooks.py
          --deselect tests/test_notifications.py::TestSendSms::test_send_sms_success
          -q

  # ── Docker Build ───────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t miskmatch-api:ci .
        working-directory: MISKMATCH_BACKEND_FINAL/miskmatch

      - name: Verify image runs
        run: |
          docker run -d --name ci-test \
            -e ENVIRONMENT=development \
            -e SECRET_KEY=ci-test-secret-key-minimum-32-characters \
            -e DATABASE_URL=sqlite+aiosqlite:///./test.db \
            -e REDIS_URL=redis://localhost:6379/0 \
            -p 8000:8000 \
            miskmatch-api:ci
          sleep 5
          docker logs ci-test
          docker stop ci-test
