name: Admin Dashboard CI

on:
  push:
    branches: [main, develop]
    paths:
      - "MISKMATCH_ADMIN_DASHBOARD/**"
      - ".github/workflows/admin.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "MISKMATCH_ADMIN_DASHBOARD/**"
      - ".github/workflows/admin.yml"

defaults:
  run:
    working-directory: MISKMATCH_ADMIN_DASHBOARD

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: MISKMATCH_ADMIN_DASHBOARD/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: ESLint
        run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: MISKMATCH_ADMIN_DASHBOARD/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: TypeScript strict check
        run: npx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: MISKMATCH_ADMIN_DASHBOARD/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build production bundle
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

      - name: Verify build output
        run: test -d .next && echo "Build successful"
