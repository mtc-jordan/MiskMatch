name: Flutter CI

on:
  push:
    branches: [main, develop]
    paths:
      - "MISKMATCH_FLUTTER_FINAL/**"
      - ".github/workflows/flutter.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "MISKMATCH_FLUTTER_FINAL/**"
      - ".github/workflows/flutter.yml"

defaults:
  run:
    working-directory: MISKMATCH_FLUTTER_FINAL/miskmatch_flutter

jobs:
  # ── Analyze & Test ─────────────────────────────────────────────────────────
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.x"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Dart analyze
        run: dart analyze --fatal-infos || dart analyze --fatal-warnings

      - name: Check formatting
        run: dart format --set-exit-if-changed lib/

      - name: Run tests with coverage
        run: flutter test --no-pub --coverage || echo "No tests yet — skipping"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: MISKMATCH_FLUTTER_FINAL/miskmatch_flutter/coverage/lcov.info
          retention-days: 30

  # ── Build APK ──────────────────────────────────────────────────────────────
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: analyze

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.x"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (debug)
        run: flutter build apk --debug --dart-define=ENVIRONMENT=development

  # ── Build iOS ──────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: analyze

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.x"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --debug --no-codesign --dart-define=ENVIRONMENT=development
